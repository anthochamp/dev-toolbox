extends:
  - common.yaml

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{dart}"
      run: |
        if command -v fvm >/dev/null 2>&1; then
          _dart() { fvm dart "$@"; }
        else
          _dart() { dart "$@"; }
        fi
        _dart format --output=none --set-exit-if-changed ${staged_files}
    analyze:
      glob: "*.{dart}"
      run: |
        if command -v fvm >/dev/null 2>&1; then
          _dart() { fvm dart "$@"; }
        else
          _dart() { dart "$@"; }
        fi
        _dart analyze --fatal-infos {staged_files}
    ac_code_metrics:
      glob: "*.{dart}"
      run: |
        if command -v fvm >/dev/null 2>&1; then
          _dart() { fvm dart "$@"; }
        else
          _dart() { dart "$@"; }
        fi
        if _dart pub deps --executables | grep -q ac_code_metrics; then
          _dart run ac_code_metrics:metrics analyze {staged_files}
        fi
