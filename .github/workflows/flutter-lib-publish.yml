name: Publish a flutter lib project

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: The branch, tag or SHA to checkout. Defaults to the reference or SHA for that event.
        required: false
        type: string
      package-dir:
        description: Directory within the repository where the package is located
        required: false
        type: string
      dry-run:
        description: "Perform a dry-run only (flutter pub publish --dry-run); does not publish to pub.dev"
        required: false
        type: boolean
        default: false
    secrets:
      gcp-service-account-key:
        description: GCP service account key JSON for pub.dev publishing
        required: true
    outputs:
      version:
        description: "Package version read from pubspec.yaml (e.g., 1.2.3)"
        value: ${{ jobs.flutter-publish.outputs.version }}
      tag:
        description: "Git tag derived from the package version (e.g., v1.2.3)"
        value: ${{ jobs.flutter-publish.outputs.tag }}

jobs:
  flutter-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.checkout-ref }}

      # setup-dart action is required for setting up publish auth
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - uses: flutter-actions/setup-flutter@6d11b83d56c388d0b6fe865194248a01a48548b5 # v4.1

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.gcp-service-account-key }}
          token_format: id_token
          id_token_audience: https://pub.dev
          id_token_include_email: true
          create_credentials_file: false

      - name: Add pub.dev token
        run: echo "${{ steps.auth.outputs.id_token }}" | dart pub token add https://pub.dev

      - name: Read package version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
        working-directory: ${{ inputs.package-dir || '.' }}

      - name: Install dependencies
        run: flutter pub get
        working-directory: ${{ inputs.package-dir }}

      - name: Publish (dry run)
        run: flutter pub publish --dry-run
        working-directory: ${{ inputs.package-dir }}

      - name: Publish to pub.dev
        if: ${{ !inputs.dry-run }}
        run: flutter pub publish -f
        working-directory: ${{ inputs.package-dir }}
